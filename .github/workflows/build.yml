name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-go:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            GOOS: linux
            GOARCH: amd64
            EXT: ''
          - os: ubuntu-latest
            GOOS: linux
            GOARCH: arm64
            EXT: ''
          - os: macos-latest
            GOOS: darwin
            GOARCH: amd64
            EXT: ''
          - os: macos-latest
            GOOS: darwin
            GOARCH: arm64
            EXT: ''
          - os: windows-latest
            GOOS: windows
            GOARCH: amd64
            EXT: '.exe'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.GOOS }}
          GOARCH: ${{ matrix.GOARCH }}
        shell: bash
        run: |
          go build -o "lmfdb-${{ matrix.GOOS }}-${{ matrix.GOARCH }}${{ matrix.EXT }}" ./cmd/lmfdb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lmfdb-${{ matrix.GOOS }}-${{ matrix.GOARCH }}
          path: lmfdb-*

  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: |
          pip install build
          python -m build --wheel --sdist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  release:
    needs: [build-go, build-python]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/lmfdb-*
            artifacts/python-dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
